services:
  - type: web
    name: pieces-api
    runtime: node
    region: frankfurt
    plan: free
    rootDir: .
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm -F shared db:generate && pnpm -F api build
    startCommand: pnpm -F api start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: PORT
        value: 10000
      - key: PINO_LOG_LEVEL
        value: info
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
