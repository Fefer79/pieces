name = "pieces"
main = ".open-next/worker.js"
compatibility_date = "2026-03-31"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[[rules]]
type = "ESModule"
globs = ["**/*.js", "**/*.mjs"]

[[rules]]
type = "Text"
globs = ["**/*.html", "**/*.sql"]
