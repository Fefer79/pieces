<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 105 800 180" width="800" height="180">
  <defs>
    <linearGradient id="gearGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E85500;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00A86B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00C878;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- === MAIN GEAR === -->
  <g transform="translate(130, 195)" filter="url(#shadow)">
    <g fill="url(#gearGrad)">
      <rect x="-9" y="-76" width="18" height="22" rx="4" transform="rotate(0)"/>
      <rect x="-9" y="-76" width="18" height="22" rx="4" transform="rotate(45)"/>
      <rect x="-9" y="-76" width="18" height="22" rx="4" transform="rotate(90)"/>
      <rect x="-9" y="-76" width="18" height="22" rx="4" transform="rotate(135)"/>
      <rect x="-9" y="-76" width="18" height="22" rx="4" transform="rotate(180)"/>
      <rect x="-9" y="-76" width="18" height="22" rx="4" transform="rotate(225)"/>
      <rect x="-9" y="-76" width="18" height="22" rx="4" transform="rotate(270)"/>
      <rect x="-9" y="-76" width="18" height="22" rx="4" transform="rotate(315)"/>
      <circle cx="0" cy="0" r="60"/>
    </g>
    <circle cx="0" cy="0" r="40" fill="#FAFAFA"/>
    <circle cx="0" cy="0" r="36" fill="none" stroke="#FF6B00" stroke-width="1" opacity="0.2"/>
    <circle cx="0" cy="0" r="14" fill="url(#gearGrad)"/>
    <circle cx="0" cy="0" r="6" fill="#FAFAFA"/>
  </g>

  <!-- === SECONDARY GEAR === -->
  <g transform="translate(198, 247)" fill="url(#accentGrad)" opacity="0.9">
    <rect x="-6" y="-40" width="12" height="15" rx="3" transform="rotate(22.5)"/>
    <rect x="-6" y="-40" width="12" height="15" rx="3" transform="rotate(67.5)"/>
    <rect x="-6" y="-40" width="12" height="15" rx="3" transform="rotate(112.5)"/>
    <rect x="-6" y="-40" width="12" height="15" rx="3" transform="rotate(157.5)"/>
    <rect x="-6" y="-40" width="12" height="15" rx="3" transform="rotate(202.5)"/>
    <rect x="-6" y="-40" width="12" height="15" rx="3" transform="rotate(247.5)"/>
    <rect x="-6" y="-40" width="12" height="15" rx="3" transform="rotate(292.5)"/>
    <rect x="-6" y="-40" width="12" height="15" rx="3" transform="rotate(337.5)"/>
    <circle cx="0" cy="0" r="32"/>
    <circle cx="0" cy="0" r="20" fill="#FAFAFA"/>
    <circle cx="0" cy="0" r="16" fill="none" stroke="#00A86B" stroke-width="1" opacity="0.2"/>
    <circle cx="0" cy="0" r="8" fill="url(#accentGrad)"/>
    <circle cx="0" cy="0" r="3.5" fill="#FAFAFA"/>
  </g>

  <!-- === WORDMARK === -->
  <g filter="url(#shadow)">
    <text x="268" y="210" font-family="'Montserrat', 'Trebuchet MS', 'Helvetica Neue', sans-serif" font-weight="900" font-size="90" fill="#1A1A2E" letter-spacing="5">PIÈCES</text>
  </g>

  <!-- Accent underline -->
  <rect x="268" y="225" width="200" height="5" rx="2.5" fill="url(#gearGrad)"/>
  <rect x="476" y="225" width="70" height="5" rx="2.5" fill="url(#accentGrad)"/>

  <!-- Tagline -->
  <text x="270" y="262" font-family="'Montserrat', 'Trebuchet MS', 'Helvetica Neue', sans-serif" font-weight="300" font-size="18" fill="#666680" letter-spacing="8">PIÈCES DÉTACHÉES · CI</text>
</svg>
