services:
  - type: web
    name: pieces-api
    runtime: node
    region: frankfurt
    plan: starter
    rootDir: .
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm -F shared db:generate && pnpm -F api build
    # `pnpm -F api start` lance `prisma migrate deploy` avant node (voir le script start
    # de apps/api) : les migrations s'appliquent à chaque déploiement, même si le
    # startCommand réel du service Render est resté « pnpm -F api start ».
    startCommand: pnpm -F api start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: PORT
        value: 10000
      - key: PINO_LOG_LEVEL
        value: info
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
